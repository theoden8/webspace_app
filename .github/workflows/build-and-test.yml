name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  validate:
    name: Validate Fastlane + OpenSpec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Fastlane metadata
        run: ./scripts/validate_fastlane_metadata.sh
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      # Restore the headless Chromium that Puppeteer's postinstall
      # downloaded last run. Puppeteer caches at ~/.cache/puppeteer
      # (~280 MB chrome + ~100 MB chrome-headless-shell). Keying on
      # package-lock.json invalidates the cache when the Puppeteer
      # version bumps, so we never run tests against a Chromium that
      # mismatches the puppeteer client.
      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            puppeteer-${{ runner.os }}-
      - name: Install npm dependencies
        run: npm ci
      - name: Validate OpenSpec
        run: npx openspec validate --no-interactive --all
      # Idempotent: if the cache restored a matching Chromium, this
      # step prints "already installed" and exits in <1s. Otherwise it
      # downloads ~280 MB into ~/.cache/puppeteer. Running it as a
      # discrete step (rather than relying on Puppeteer's npm
      # postinstall) makes the install visible in the workflow log,
      # which is what we need to confirm CI is actually running the
      # browser tier rather than silently skipping it.
      - name: Install Puppeteer Chromium
        # `chrome` is the @puppeteer/browsers CLI name; `chromium` is
        # rejected as an invalid positional and yargs exits 1 on CI.
        run: npx puppeteer browsers install chrome
      # Real-Chromium tests for the blob_url_capture fix. jsdom can't
      # enforce CSP, so this is the only layer that proves
      # `connect-src` actually rejects fetch(blob:) AND that our shim
      # bypasses it. See test/browser/ + openspec/specs/downloads/.
      # process.env.CI=true (set by Actions) makes the test file
      # hard-fail when Chromium can't launch — see requireBrowser() in
      # test/browser/blob_url_capture_csp.test.js.
      - name: Run browser tests (CSP enforcement)
        run: npm run test:browser

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Flutter (for Dart SDK)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.6'
          channel: 'stable'

      - name: Cache fvm Flutter SDK
        uses: actions/cache@v4
        with:
          path: ~/.fvm/versions
          key: fvm-${{ runner.os }}-${{ hashFiles('**/.fvmrc') }}
          restore-keys: |
            fvm-${{ runner.os }}-

      - name: Install fvm
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Setup Flutter with fvm
        run: |
          fvm install
          fvm use --force

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Get dependencies
        run: fvm flutter pub get --enforce-lockfile

      - name: Run tests
        run: fvm flutter test

      - name: Generate launcher icons
        run: fvm dart run flutter_launcher_icons

      - name: Build APK
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            fvm flutter build apk --release --flavor fdroid
          else
            fvm flutter build apk --release --flavor fdroid --split-per-abi
          fi

      - name: Verify APK is free of Google Mobile Services
        # Per openspec/specs/per-site-profiles/spec.md PROF-007, no shipped
        # artifact may contain com.google.android.gms.* / firebase / play
        # classes. Scans the *built* APK because clean Gradle deps can
        # transitively pull GMS through AARs, vendored jars, or codegen —
        # an audit of `./gradlew app:dependencies` would miss those.
        run: |
          set -e
          shopt -s nullglob
          apks=( build/app/outputs/flutter-apk/*-fdroid-release.apk )
          if [ ${#apks[@]} -eq 0 ]; then
            echo "ERROR: no fdroid APK found to scan" >&2
            exit 1
          fi
          for apk in "${apks[@]}"; do
            bash scripts/check_no_gms.sh "$apk"
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

      # Android Screenshots (conditional)
      - name: Install ImageMagick (AppImage for magick command)
        if: github.event_name == 'workflow_dispatch'
        run: |
          curl -L https://imagemagick.org/archive/binaries/magick -o magick
          chmod +x magick
          sudo mv magick /usr/local/bin/magick

      - name: Enable KVM for emulator acceleration
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Android SDK
        if: github.event_name == 'workflow_dispatch'
        uses: android-actions/setup-android@v3

      - name: AVD snapshot cache
        id: avd-cache
        if: github.event_name == 'workflow_dispatch'
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-google_apis-pixel_5-v1

      - name: Pre-warm AVD snapshot
        if: github.event_name == 'workflow_dispatch' && steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disk-size: 4096M
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Create AVD and generate screenshots
        if: github.event_name == 'workflow_dispatch'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disk-size: 4096M
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Wait for emulator to be fully booted
            adb wait-for-device
            adb shell input keyevent 82

            # Create screenshots directory
            mkdir -p screenshots/android

            # Run fastlane android screenshots using bundle
            bundle exec fastlane android screenshots

      - name: Cache Fastlane frameit assets
        uses: actions/cache@v4
        with:
          path: ~/.fastlane/frameit/latest
          key: frameit-${{ runner.os }}

      - name: Add device frames to screenshots
        if: github.event_name == 'workflow_dispatch'
        run: bundle exec fastlane android add_device_frames

      - name: Upload Android screenshots
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshots
          path: screenshots/android/*.png
          if-no-files-found: warn

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    # Run inside Debian Sid because libwpewebkit-2.0-dev needs to be at
    # least 2.50: flutter_inappwebview_linux 0.1.0-beta.1 calls
    # webkit_navigation_action_is_for_main_frame (added in 2.50) and
    # webkit_web_view_get_theme_color (also 2.50). Trixie ships 2.48
    # which is too old; Ubuntu Noble has no WPE packages at all; Jammy
    # is 2.36. Sid has 2.52.3. Sid is technically "unstable" but the
    # WPE WebKit toolchain there has been the most stable path; if
    # anything else in the apt set breaks we'll surface the package
    # name and pin if needed. The Android job stays untouched on the
    # ubuntu-latest host runner — only Linux is in this container.
    container:
      image: debian:sid-slim
    steps:
      - name: Install container base + Flutter Linux + WPE WebKit deps
        # debian:sid-slim ships nothing — Actions need git/curl/unzip
        # just to function. Flutter desktop linux needs gtk/lzma/secret/
        # epoxy. The plugin needs libwpewebkit-2.0-dev plus libwpe-1.0-dev
        # and libwpebackend-fdo-1.0-dev (legacy fallback path; harmless
        # to install even though the plugin prefers WPEPlatform).
        run: |
          set -x
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl wget git unzip xz-utils sudo \
            build-essential clang lld llvm cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libepoxy-dev \
            libwpewebkit-2.0-dev libwpebackend-fdo-1.0-dev libwpe-1.0-dev
          rm -rf /var/lib/apt/lists/*
          pkg-config --modversion wpe-webkit-2.0 || echo "wpe-webkit-2.0 NOT FOUND"
          pkg-config --modversion wpe-platform-2.0 || echo "wpe-platform-2.0 NOT FOUND"

      - name: Checkout code
        uses: actions/checkout@v4

      # Run the Node-side JS shim tests (jsdom + node:test) before the
      # heavy Flutter steps so a shim regression fails fast without
      # waiting on the Linux build. setup-node works inside the
      # container as long as curl/tar/unzip are present (installed
      # above).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run JS shim tests
        run: npm run test:js

      - name: Cache fvm Flutter SDK
        uses: actions/cache@v4
        with:
          # GitHub Actions sets HOME=/github/home inside container jobs
          # (not /root, even though the container runs as root). fvm
          # install script v2.0.0+ caches Flutter SDKs under $HOME/fvm/versions.
          path: ~/fvm/versions
          key: fvm-debian-sid-${{ hashFiles('**/.fvmrc') }}
          restore-keys: |
            fvm-debian-sid-

      - name: Install fvm (standalone binary)
        # fvm.app/install.sh v2 installs the binary to $HOME/fvm/bin/fvm.
        # GitHub Actions overrides HOME to /github/home in container jobs,
        # so the binary lands at /github/home/fvm/bin/fvm. Append it to
        # GITHUB_PATH for subsequent steps. fvm itself manages Flutter SDK
        # installs — no Dart bootstrap needed.
        run: |
          set -x
          curl -fsSL https://fvm.app/install.sh | bash
          ls -la "$HOME/fvm/bin/"
          echo "$HOME/fvm/bin" >> "$GITHUB_PATH"
          "$HOME/fvm/bin/fvm" --version

      - name: Setup Flutter with fvm
        run: |
          fvm install
          fvm use --force

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            /root/.pub-cache
            .dart_tool
          key: pub-debian-sid-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-debian-sid-

      - name: Get dependencies
        run: fvm flutter pub get --enforce-lockfile

      - name: Build Linux
        run: fvm flutter build linux --release

  build-apple:
    name: Build iOS & macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install CocoaPods
        run: |
          brew install cocoapods
          brew link --force cocoapods

      - name: Install ImageMagick and Fastlane (screenshots only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          brew install imagemagick-full fastlane
          brew link --force imagemagick-full
          brew link --force fastlane

      - name: Cache fvm Flutter SDK
        uses: actions/cache@v4
        with:
          path: ~/.fvm/versions
          key: fvm-${{ runner.os }}-${{ hashFiles('**/.fvmrc') }}
          restore-keys: |
            fvm-${{ runner.os }}-

      - name: Install fvm
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Setup Flutter with fvm
        run: |
          fvm install
          fvm use --force

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            macos/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'macos/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Get dependencies
        run: fvm flutter pub get --enforce-lockfile

      - name: Run tests
        run: fvm flutter test

      - name: Generate launcher icons
        run: fvm dart run flutter_launcher_icons

      - name: Build IPA
        run: fvm flutter build ipa --release --no-codesign

      - name: Build macOS
        run: fvm flutter build macos --release

      - name: Create macOS ZIP archive
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../webspace-macos.zip webspace.app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: webspace-macos.zip

      # iOS Screenshots (conditional)
      - name: List available simulators
        if: github.event_name == 'workflow_dispatch'
        run: xcrun simctl list devices available

      - name: Boot iOS Simulator
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Find and boot an iPhone 15 Pro simulator
          DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone 15 Pro" | grep -v "Max" | head -1 | grep -oE '\([A-F0-9-]+\)' | tr -d '()')
          if [ -z "$DEVICE_ID" ]; then
            # Fallback to iPhone 14 Pro if iPhone 15 Pro not available
            DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone 14 Pro" | grep -v "Max" | head -1 | grep -oE '\([A-F0-9-]+\)' | tr -d '()')
          fi
          if [ -z "$DEVICE_ID" ]; then
            # Fallback to any available iPhone
            DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | grep -oE '\([A-F0-9-]+\)' | tr -d '()')
          fi
          echo "Booting simulator: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          echo "SIMULATOR_ID=$DEVICE_ID" >> $GITHUB_ENV

      - name: Wait for simulator to boot
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Wait for simulator to be fully booted
          xcrun simctl bootstatus "$SIMULATOR_ID" -b
          sleep 10

      - name: Create screenshots directory
        if: github.event_name == 'workflow_dispatch'
        run: mkdir -p screenshots/ios

      - name: Generate iOS screenshots
        if: github.event_name == 'workflow_dispatch'
        run: fastlane ios screenshots

      - name: Cache Fastlane frameit assets
        uses: actions/cache@v4
        with:
          path: ~/.fastlane/frameit/latest
          key: frameit-${{ runner.os }}

      - name: Add device frames to iOS screenshots
        if: github.event_name == 'workflow_dispatch'
        run: fastlane ios add_device_frames

      - name: Upload iOS screenshots
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: screenshots/ios/*.png
          if-no-files-found: warn

  release-summary:
    name: Release Summary
    needs: [build-android, build-linux, build-apple]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display structure
        run: ls -R

      - name: Create release summary
        run: |
          echo "## Build Artifacts Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Android APKs (fdroid flavor, split by ABI)" >> $GITHUB_STEP_SUMMARY
          echo "✅ iOS IPA (unsigned)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Linux x64 build" >> $GITHUB_STEP_SUMMARY
          echo "✅ macOS app bundle" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All platform builds completed successfully!" >> $GITHUB_STEP_SUMMARY
