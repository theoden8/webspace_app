name: webspace
description: WebSpace is a mobile app that brings all your favorite websites and web apps together in one organized, streamlined interface.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 0.2.1+16

environment:
  sdk: '3.10.7'
  flutter: '3.38.6'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.1.0
  http: ^1.2.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  html: ^0.15.4

  # Webview packages
  # Android/mobile: flutter_inappwebview (stable, feature-rich)
  flutter_inappwebview: ^6.1.0+1

  url_launcher: ^6.1.10
  uuid: ^4.5.1
  image: ^4.3.0  # Required by third_party/favicon
  file_picker: ^11.0.2
  flutter_secure_storage: ^10.0.0
  package_info_plus: ^9.0.1
  flutter_cache_manager: ^3.3.0
  path_provider: ^2.1.0
  encrypt: ^5.0.3
  share_plus: ^12.0.0
  material_design_icons_flutter: ^7.0.7296
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  # Used to unzip the downloaded timezone-boundary-builder GeoJSON release.
  # Already a transitive dependency of other packages; promoted to direct
  # so it has a stable version constraint we control.
  archive: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# Per-site profile isolation requires patches to the
# flutter_inappwebview platform plugins. The patches live as `.patch`
# files at `third_party/flutter_inappwebview_*.patch`; the
# dependency_overrides below point at paths that
# `dart run scripts/apply_plugin_patches.dart` materializes by copying
# stock upstream from `~/.pub-cache/` (or downloading from pub.dev on
# cache miss) into `.dart_tool/webspace_patched_plugins/<plugin>/` and
# applying the per-plugin .patch.
#
# Clean-checkout workflow — ONE COMMAND:
#
#   dart run scripts/apply_plugin_patches.dart
#
# (a plain `flutter pub get` fails with exit 66 because pub validates
# that path: dependency targets exist before downloading anything; the
# script bootstraps those paths and then runs pub get for you).
#
# Each patch teaches its plugin to honor a `webspaceProfile` settings
# field and bind the WebView to a per-site profile / WKWebsiteDataStore
# BEFORE any session-bound op locks it to the default. Full rationale,
# upgrade procedure, and `[WebSpace fork patch]` marker convention are
# in `third_party/PATCHES.md`. Spec: openspec/specs/per-site-profiles/spec.md.
dependency_overrides:
  flutter_inappwebview_android:
    path: .dart_tool/webspace_patched_plugins/flutter_inappwebview_android
  flutter_inappwebview_ios:
    path: .dart_tool/webspace_patched_plugins/flutter_inappwebview_ios
  flutter_inappwebview_macos:
    path: .dart_tool/webspace_patched_plugins/flutter_inappwebview_macos

flutter:
  uses-material-design: true
  assets:
    - assets/LICENSE
    - assets/licenses/
    - assets/webspace_icon.png
    - assets/webspace_icon_dark.png

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/webspace_icon.png"  # 1024x1024 PNG recommended
  remove_alpha_ios: true
  image_path: "assets/webspace_icon.png"  # Path to your icon.png
  image_path_ios_dark_transparent: "assets/webspace_icon_dark.png"
  adaptive_icon_background: "#FFFFFF"  # Optional Android background
  adaptive_icon_foreground: "assets/webspace_icon.png"
