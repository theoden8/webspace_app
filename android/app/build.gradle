plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "org.codeberg.theoden8.webspace"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "org.codeberg.theoden8.webspace"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            def keystoreProperties = new Properties()
            def keystorePropertiesFile = rootProject.file('key.properties')
            if(!keystorePropertiesFile.exists())return;

            keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    flavorDimensions "deploy"

    productFlavors {
      fdroid {
        dimension "deploy"
      }

      fdebug {
        dimension "deploy"
      }

      fmain {
        dimension "deploy"
        signingConfig signingConfigs.release
      }
    }

    buildTypes {
        release {
            // Only use release signing if keystore exists
            def keystorePropertiesFile = rootProject.file('key.properties')
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
}

// Offset to ensure new F-Droid version codes (versionCode*10+abi) exceed
// the old scheme's codes (abi*1000+versionCode) for all architectures.
// Old max was x86_64: 3*1000+12=3012. With offset 300: (13+300)*10+3=3133>3012.
def versionCodeOffset = 300
def abiCodes = ["armeabi-v7a": 1, "arm64-v8a": 2, "x86_64": 3]
android.applicationVariants.configureEach { variant ->
    variant.outputs.forEach { output ->
        def abiVersionCode = abiCodes.get(output.getFilter(com.android.build.OutputFile.ABI))
        if (abiVersionCode != null) {
            output.versionCodeOverride = (variant.versionCode + versionCodeOffset) * 10 + abiVersionCode
        } else {
            output.versionCodeOverride = (variant.versionCode + versionCodeOffset) * 10
        }
    }
}

flutter {
    source '../..'
}

dependencies {
}
