plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "org.codeberg.theoden8.webspace"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "org.codeberg.theoden8.webspace"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            def keystoreProperties = new Properties()
            def keystorePropertiesFile = rootProject.file('key.properties')
            if(!keystorePropertiesFile.exists())return;

            keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    flavorDimensions "deploy"

    productFlavors {
      fdroid {
        dimension "deploy"
        // fdroid flavor is unsigned for F-Droid distribution (F-Droid signs
        // APKs server-side). Use debug signing so CI artifacts are installable.
        signingConfig signingConfigs.debug
      }

      fdebug {
        dimension "deploy"
      }

      fmain {
        dimension "deploy"
        signingConfig signingConfigs.release
      }
    }

    buildTypes {
        release {
            // Only use release signing if keystore exists
            def keystorePropertiesFile = rootProject.file('key.properties')
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
}

// Multiply by 1000 (not 10) to ensure version codes exceed the old scheme
// (abi*1000+versionCode) which produced codes like 2012 for arm64-v8a v12.
// New scheme: 13*1000+2=13002 > 2012. Universal: 13*1000=13000 > 12.
def abiCodes = ["armeabi-v7a": 1, "arm64-v8a": 2, "x86_64": 3]
android.applicationVariants.configureEach { variant ->
    variant.outputs.forEach { output ->
        def abiVersionCode = abiCodes.get(output.getFilter(com.android.build.OutputFile.ABI))
        if (abiVersionCode != null) {
            output.versionCodeOverride = variant.versionCode * 1000 + abiVersionCode
        } else {
            output.versionCodeOverride = variant.versionCode * 1000
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // AndroidX WebKit for per-site container isolation (Profile API) and
    // WebAuthn/passkey support (setWebAuthenticationSupport API).
    implementation "androidx.webkit:webkit:1.14.0"
    // WebAuthn/Passkey support via Android Credential Manager
    implementation "androidx.credentials:credentials:1.5.0"
}
