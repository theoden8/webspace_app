plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "org.codeberg.theoden8.webspace"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
    }

    testOptions {
        // Make Android-framework references in our plugins (Log, etc.)
        // return their default Java values instead of throwing
        // RuntimeException at unit-test time, so we can JVM-test the
        // pure-Kotlin glue (mapResourceType, AdblockEngineNative
        // soft-fallback) without dragging in Robolectric. Anything
        // touching real Android UI lives in instrumentation tests
        // proper, not here.
        unitTests {
            returnDefaultValues = true
            includeAndroidResources = false
        }
    }

    defaultConfig {
        applicationId "org.codeberg.theoden8.webspace"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            def keystoreProperties = new Properties()
            def keystorePropertiesFile = rootProject.file('key.properties')
            if(!keystorePropertiesFile.exists())return;

            keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    flavorDimensions "deploy"

    productFlavors {
      fdroid {
        dimension "deploy"
        // fdroid flavor is unsigned for F-Droid distribution (F-Droid signs
        // APKs server-side). Use debug signing so CI artifacts are installable.
        signingConfig signingConfigs.debug
      }

      fdebug {
        dimension "deploy"
      }

      fmain {
        dimension "deploy"
        signingConfig signingConfigs.release
      }
    }

    buildTypes {
        release {
            // Only use release signing if keystore exists
            def keystorePropertiesFile = rootProject.file('key.properties')
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
}

// Multiply by 1000 (not 10) to ensure version codes exceed the old scheme
// (abi*1000+versionCode) which produced codes like 2012 for arm64-v8a v12.
// New scheme: 13*1000+2=13002 > 2012. Universal: 13*1000=13000 > 12.
def abiCodes = ["armeabi-v7a": 1, "arm64-v8a": 2, "x86_64": 3]
android.applicationVariants.configureEach { variant ->
    variant.outputs.forEach { output ->
        def abiVersionCode = abiCodes.get(output.getFilter(com.android.build.OutputFile.ABI))
        if (abiVersionCode != null) {
            output.versionCodeOverride = variant.versionCode * 1000 + abiVersionCode
        } else {
            output.versionCodeOverride = variant.versionCode * 1000
        }
    }
}

flutter {
    source '../..'
}

// =====================================================================
// Rust adblock-rust auto-build. Runs `scripts/build_rust.sh android <abi>`
// for each ABI Flutter targets (via -Ptarget-platform) before Gradle merges
// jniLibs, dropping the per-ABI .so into android/app/src/main/jniLibs/<abi>/.
// A single-ABI build (e.g. F-Droid's per-arch split) compiles only that ABI;
// a universal/plain build compiles all. Up-to-date checks key on the crate's
// Cargo.lock + every src file, so unchanged builds are a no-op.
//
// Hard prerequisites:
//   * `cargo` on PATH (rustup recommended)
//   * `cargo-ndk` (auto-installed on first run via `cargo install` if absent)
//   * `ANDROID_NDK_HOME` env var pointing at an NDK install. Most installs
//     have it under `$ANDROID_HOME/ndk/<version>`. If unset, we try to
//     locate the highest-versioned NDK under `local.properties`'s
//     sdk.dir → ndk/ subdir.
//
// Skip with `-PskipRustAdblock=true` (e.g. for CI jobs that don't need
// the .so, or for IDE indexing where the build_rust.sh side-effects
// would be surprising).
// =====================================================================
def rustCrateDir = file("${rootProject.projectDir}/../rust/webspace_adblock")
def rustScript   = file("${rootProject.projectDir}/../scripts/build_rust.sh")
def jniLibsRoot  = file("${projectDir}/src/main/jniLibs")
def abis         = ["arm64-v8a", "armeabi-v7a", "x86_64", "x86"]

// Flutter passes -Ptarget-platform=android-arm[,android-arm64,...] to say
// which ABIs this invocation targets (per-ABI split, --target-platform, or
// the default 3-ABI universal set). Mirror that selection so a single-ABI
// build compiles only its own Rust .so instead of all four. No property
// (plain gradlew / IDE indexing) falls back to every ABI.
def platformToAbi = [
    "android-arm"  : "armeabi-v7a",
    "android-arm64": "arm64-v8a",
    "android-x64"  : "x86_64",
    "android-x86"  : "x86",
]
def targetPlatform = project.findProperty("target-platform")?.toString()
def selectedAbis = (targetPlatform
    ? targetPlatform.split(",").collect { platformToAbi[it.trim()] }.findAll { it != null }
    : abis)
if (selectedAbis.isEmpty()) {
    selectedAbis = abis
}

tasks.register("buildRustAdblock", Exec) {
    description = "Build webspace_adblock Rust library for the target Android ABIs"
    group = "build"

    inputs.file rustScript
    inputs.file new File(rustCrateDir, "Cargo.toml")
    inputs.file new File(rustCrateDir, "Cargo.lock")
    inputs.dir new File(rustCrateDir, "src")
    selectedAbis.each { abi ->
        outputs.file new File(jniLibsRoot, "${abi}/libwebspace_adblock.so")
    }
    onlyIf {
        if (project.hasProperty("skipRustAdblock") &&
            project.property("skipRustAdblock").toString() == "true") {
            logger.lifecycle("buildRustAdblock: skipped via -PskipRustAdblock=true")
            return false
        }
        true
    }

    workingDir rootProject.projectDir.parentFile
    commandLine "bash", "-c",
        "set -e; for abi in ${selectedAbis.join(' ')}; do scripts/build_rust.sh android \"\$abi\"; done"

    // Resolve ANDROID_NDK_HOME from env, then fall back to the NDK
    // sub-directory of the SDK declared in local.properties. cargo-ndk
    // refuses to run without it. The NDK version under sdk/ndk/ is
    // platform-version-stamped and may be a single dir; pick the
    // newest if multiple are present.
    doFirst {
        def ndkHome = System.getenv("ANDROID_NDK_HOME") ?: System.getenv("ANDROID_NDK_ROOT")
        if (ndkHome == null || ndkHome.isEmpty()) {
            def localProps = new Properties()
            def localPropsFile = rootProject.file('local.properties')
            if (localPropsFile.exists()) {
                localPropsFile.withReader('UTF-8') { localProps.load(it) }
            }
            def sdkDir = localProps.getProperty('sdk.dir')
            if (sdkDir != null) {
                def ndkBase = new File(sdkDir, 'ndk')
                if (ndkBase.isDirectory()) {
                    // listFiles(Closure) is ambiguous in Groovy
                    // (FileFilter vs FilenameFilter overloads), so use
                    // the no-arg form and findAll. Returns null if the
                    // dir doesn't exist — handled by `?.`.
                    def candidates = ndkBase.listFiles()?.findAll { it.isDirectory() }?.sort()
                    if (candidates && candidates.size() > 0) {
                        ndkHome = candidates.last().absolutePath
                    }
                }
            }
        }
        if (ndkHome == null) {
            throw new GradleException(
                "ANDROID_NDK_HOME not set and no NDK found under \$ANDROID_HOME/ndk/. " +
                "Install one with sdkmanager 'ndk;26.3.11579264' or set the env var. " +
                "Alternatively run with -PskipRustAdblock=true to ship without engine support.")
        }
        environment "ANDROID_NDK_HOME", ndkHome
        logger.lifecycle("buildRustAdblock: ANDROID_NDK_HOME=${ndkHome}")
    }
}

// Hook so any APK/AAB assembly waits for the .so to exist. mergeJniLibs
// is the moment Gradle copies jniLibs/<abi>/ into the assembled output;
// running our task before that ensures the file is present to merge.
android.applicationVariants.configureEach { variant ->
    def variantName = variant.name.capitalize()
    tasks.matching { it.name == "merge${variantName}JniLibFolders" }.configureEach {
        dependsOn "buildRustAdblock"
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    // Profile API for per-site cookie/storage isolation. Used by the
    // fork's flutter_inappwebview_android (ws-<siteId> containers) and
    // by WebSpaceContainerPlugin's MULTI_PROFILE runtime probe — see
    // openspec/specs/per-site-containers/spec.md. The MULTI_PROFILE
    // feature is gated at runtime via WebViewFeature.isFeatureSupported;
    // devices whose System WebView does not advertise it fall through
    // to the legacy capture-nuke-restore engine.
    implementation "androidx.webkit:webkit:1.12.1"
    // WorkManager backs NOTIF-005-A: PeriodicWorkRequest schedules
    // ~15-min refreshes that wake the app to reload notification sites,
    // mirroring iOS BGAppRefreshTask without a foreground service.
    implementation "androidx.work:work-runtime-ktx:2.9.1"

    // JVM unit tests for the Kotlin plugins. Run with:
    //   ./gradlew :app:testFdroidDebugUnitTest
    // Catches Kotlin compile errors and pure-Kotlin logic bugs in
    // CI's "Build Android" job before the much-slower flutter build
    // step would. We deliberately do NOT pull Robolectric — the
    // returnDefaultValues=true testOption above stubs the Android
    // framework SDK calls so any pure-Kotlin code path is testable.
    testImplementation "junit:junit:4.13.2"
    testImplementation "org.mockito:mockito-core:5.14.2"
    testImplementation "org.mockito.kotlin:mockito-kotlin:5.4.0"
}
